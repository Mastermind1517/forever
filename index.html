<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Special Question 💖</title>
    <style>
        /* General Page Styling */
        body {
            margin: 0;
            padding: 0;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
        }
        
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* The Popup Box */
        .popup {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
            max-width: 350px;
            width: 90%;
            position: relative;
            z-index: 10;
            animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h2 {
            color: #5a3e54;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        /* Button Container */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative; /* Needed for absolute positioning of No button */
            height: 60px; /* Reserve space */
        }

        /* Button Styling */
        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        #yesBtn {
            background-color: #fff;
            color: #ff6b81;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.3);
        }

        #yesBtn:hover {
            transform: scale(1.05);
            background-color: #ffe0e3;
        }

        #noBtn {
            background-color: #fff;
            color: #a4b0be;
            position: absolute; /* Allows free movement */
            left: 50%; /* Start centered */
            transform: translateX(-50%);
        }

        /* Success Message (Hidden initially) */
        #successMessage {
            display: none;
            text-align: center;
            z-index: 20;
        }

        #successMessage h1 {
            color: #ff6b81;
            font-size: 3rem;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Floating Text (The "Nope" messages) */
        .floating-text {
            position: absolute;
            font-size: 0.9rem;
            color: #555;
            font-weight: bold;
            pointer-events: none; /* Click through */
            animation: floatUp 1s ease-out forwards;
            white-space: nowrap;
            z-index: 1000;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-30px); }
        }

        /* Falling Hearts Animation */
        .heart {
            position: absolute;
            top: -10px;
            color: #ff6b81;
            font-size: 20px;
            animation: fall linear forwards;
            z-index: 5;
        }

        @keyframes fall {
            to { transform: translateY(105vh); }
        }

        button {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

    <!-- The Main Popup -->
    <div class="popup" id="mainPopup">
        <h2>Will you be my forever GUKHANI? 💖</h2>
        <div class="btn-container">
            <button id="yesBtn">Yes 💖</button>
            <button id="noBtn">No 😅</button>
        </div>
    </div>

    <!-- The Success Message -->
    <div id="successMessage">
        <h1>Yayyy! I knew it! 💕</h1>
        <p>You just made me the happiest person alive!</p>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const popup = document.getElementById('mainPopup');
        const successMsg = document.getElementById('successMessage');

        const noMessages = [
            "Nope, not possible 😌",
            "No can't escape 😏",
            "Haha, nice try 😂",
            "Try again! 🤪",
            "Not a chance! 🙅‍♀️",
            "Are you sure? 🤔",
            "Mumma wants to run? 😥",
            "How dare you? 🔪",
            "Access denied 🚫",
            "Permission rejected ❌",
            "Plot twist! Nope 🎬",
            "Mission failed 😜",
            "That button is shy 🫣",
            "Try harder, queen 👸",
            "Almost… but still no 😌",
            "Denied by the love committee 💕",
            "Security says no 🔐",
            "That was cute though 🥹",
            "This button has trust issues 😭",
            "Not today, my wifey🤭",
            "Wrong choice detected 🚨",
            "Nope, destiny says YES only ✨",
            "Your finger missed again 👀",
            "That’s illegal here 🚔",
            "System overthinking: YES required 💖",
            "Are you nervous? 😳",
            "The universe refuses this ❌🌌",
            "This is a YES-only zone 🚫❌",
            "Denied with love 💌",
            "That click was suspicious 🤨",
            "Romance firewall activated 🔥",
            "That option expired 😌",
            "Keep trying, I’m entertained 🍿"
        ];

        // Move button randomly (mobile + desktop safe)
        function moveButton() {

            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            const maxX = window.innerWidth - btnWidth - 10;
            const maxY = window.innerHeight - btnHeight - 10;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            noBtn.style.transform = 'none';

            showFloatingText(randomX, randomY);
        }

        function showFloatingText(x, y) {
            const text = document.createElement('div');
            text.classList.add('floating-text');
            text.innerText = noMessages[Math.floor(Math.random() * noMessages.length)];

            text.style.left = Math.min(x + 10, window.innerWidth - 150) + 'px';
            text.style.top = Math.max(y - 20, 10) + 'px';

            document.body.appendChild(text);

            setTimeout(() => {
                text.remove();
            }, 1000);
        }

        // Universal pointer event (works on mobile + desktop)
        noBtn.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            moveButton();
        });

        // Yes button
        yesBtn.addEventListener('pointerdown', function() {
            popup.style.display = 'none';
            successMsg.style.display = 'block';
            startHeartRain();
        });

        function startHeartRain() {
            const heartCount = 50;

            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = '❤️';

                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';

                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 4000);
            }
        }
    </script>
</body>
</html>
